<!DOCTYPE html>
<html>
<head>
<title>PlayNova</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,200px);
gap:20px;
justify-content:center;
padding:30px;
}

.game{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
}

.game img{
width:100%;
border-radius:8px;
}

.game:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<header>🚀 PlayNova</header>

<div class="games">

<div class="game">
<a href="game1.html">
<img src="https://via.placeholder.com/200x120">
</a>
<p>Game 1</p>
</div>

<div class="game">
<a href="game2.html">
<img src="https://via.placeholder.com/200x120">
</a>
<p>Game 2</p>
</div>

<div class="game">
<a href="game3.html">
<img src="https://via.placeholder.com/200x120">
</a>
<p>Game 3</p>
</div>

</div>

</body>
</html>
